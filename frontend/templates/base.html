<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <meta name="description" content="DailyBread is a calm Bible-focused Discord platform for designing and sending scripture embeds.">
  <title>{{ page_title | default("DailyBread") }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              bread: {
                background: "var(--color-background)",
                surface: "var(--color-surface)",
                surface2: "var(--color-surface-2)",
                accent: "var(--color-accent)",
                ink: "var(--color-text)",
                muted: "var(--color-text-secondary)",
                border: "var(--color-border)",
                hover: "var(--color-hover)",
                linen: "var(--color-background)",
                gold: "var(--color-accent)",
                night: "var(--color-background)",
                charcoal: "var(--color-surface)",
                cream: "var(--color-surface)",
                amber: "var(--color-accent)",
                sage: "var(--color-text-secondary)"
              }
            },
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui"],
              serif: ["Cormorant Garamond", "Georgia", "serif"]
            },
            boxShadow: {
              soft: "0 18px 70px rgba(43, 43, 43, 0.12)"
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Force light-only: remove any accidental 'dark' class applied by browser or script
    try {
      document.documentElement.classList.remove('dark');
      document.body.classList.remove('dark');
    } catch (e) {
      // ignore
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body class="min-h-screen bg-bread-background text-bread-ink antialiased transition-colors duration-300">
  <div class="min-h-screen flex flex-col">
    {% include "partials/navbar.html" %}
    <main class="flex-1">
      {% block content %}{% endblock %}
    </main>
    {% include "partials/footer.html" %}
  </div>
  <script src="{{ url_for('static', path='js/app.js') }}" defer></script>
</body>
</html>
